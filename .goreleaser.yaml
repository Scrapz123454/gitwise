version: 2
project_name: gitwise

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    binary: gitwise

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: aymenhmaidiwastaken
      name: homebrew-tap
    homepage: "https://github.com/aymenhmaidiwastaken/gitwise"
    description: "AI-powered commit messages and PR descriptions from your terminal"
    license: "MIT"
    install: |
      bin.install "gitwise"
    test: |
      system "#{bin}/gitwise", "version"

release:
  github:
    owner: aymenhmaidiwastaken
    name: gitwise
  draft: false
  prerelease: auto
